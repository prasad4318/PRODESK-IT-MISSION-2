<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow | Premium Salary & Expense Tracker</title>
    <meta name="description" content="A professional and sleek salary and expense tracker with real-time analytics.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Header Section -->
        <header class="glass-container header">
            <div class="logo">
                <i data-lucide="wallet" class="accent-icon"></i>
                <h1>Cash<span>Flow</span></h1>
            </div>
            <div class="salary-input-container">
                <label for="totalSalary">Total Salary</label>
                <div class="input-wrapper">
                    <span class="currency">$</span>
                    <input type="number" id="totalSalary" placeholder="Enter Amount" min="0">
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard-grid">
            <!-- Analytics Section -->
            <section class="glass-container analytics">
                <div class="section-title">
                    <i data-lucide="pie-chart"></i>
                    <h2>Visual Analytics</h2>
                </div>
                <div class="chart-container">
                    <canvas id="flowChart"></canvas>
                </div>
                <div class="summary-cards">
                    <div class="card balance-card">
                        <span class="label">Remaining Balance</span>
                        <div class="value" id="remainingBalance">$0.00</div>
                    </div>
                    <div class="card expenses-card">
                        <span class="label">Total Expenses</span>
                        <div class="value" id="totalExpensesAmount">$0.00</div>
                    </div>
                </div>
            </section>

            <!-- Expense Form Section -->
            <section class="glass-container input-section">
                <div class="section-title">
                    <i data-lucide="plus-circle"></i>
                    <h2>Add Expense</h2>
                </div>
                <form id="expenseForm" class="expense-form">
                    <div class="form-group">
                        <label for="expenseName">Expense Name</label>
                        <input type="text" id="expenseName" placeholder="e.g. Rent, Grocery" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseCategory">Category</label>
                        <select id="expenseCategory" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Housing">Housing</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="expenseAmount">Amount</label>
                        <div class="input-wrapper">
                            <span class="currency">$</span>
                            <input type="number" id="expenseAmount" placeholder="0.00" min="0.01" step="0.01" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="addExpenseBtn">
                        <i data-lucide="plus"></i> Add Expense
                    </button>
                </form>
            </section>

            <!-- History Section -->
            <section class="glass-container history-section">
                <div class="section-title">
                    <i data-lucide="list"></i>
                    <h2>Transaction History</h2>
                </div>
                <div class="history-list-wrapper">
                    <ul id="expenseList" class="expense-list">
                        <!-- Expenses injected here -->
                         <div class="empty-state">
                            <i data-lucide="receipt-text"></i>
                            <p>No expenses added yet.</p>
                         </div>
                    </ul>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
